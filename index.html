<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Payment Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.5s ease; }
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    /* Dark Mode Glass */
    .dark .glass { background: rgba(30, 41, 59, 0.85); border-color: rgba(255, 255, 255, 0.05); }
    
    .bank-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .bank-card:hover { transform: translateY(-8px); }
    
    /* Static Active Card Styles for Single Bank */
    .bank-card.active { border-color: #003865; background: #f0f7ff; box-shadow: 0 20px 25px -5px rgba(0, 56, 101, 0.1); }
    .dark .bank-card.active { border-color: #38bdf8; background: rgba(15, 23, 42, 0.6); box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.1); }
    
    .animate-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-900 dark:to-slate-800">

  <div class="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl text-center max-w-lg w-full animate-in relative overflow-hidden transition-colors duration-500">
    
    <div class="flex justify-between items-center mb-8 relative z-10">
      <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all active:scale-90 shadow-sm">
        <span id="theme-icon" class="text-lg">🌙</span>
      </button>

      <div class="flex gap-2">
        <button onclick="changeLang('kh')" class="text-[10px] font-extrabold px-3 py-1.5 rounded-full border border-gray-200 dark:border-slate-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700 transition-all uppercase tracking-tighter">Khmer</button>
        <button onclick="changeLang('en')" class="text-[10px] font-extrabold px-3 py-1.5 rounded-full border border-gray-200 dark:border-slate-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700 transition-all uppercase tracking-tighter">English</button>
        <button onclick="changeLang('cn')" class="text-[10px] font-extrabold px-3 py-1.5 rounded-full border border-gray-200 dark:border-slate-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-700 transition-all uppercase tracking-tighter">中文</button>
      </div>
    </div>

    <header class="mb-8 relative z-10">
        <div class="w-20 h-20 bg-[#003865] dark:bg-[#0ea5e9] rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl rotate-3 hover:rotate-0 transition-all duration-500">
            <span class="text-white text-3xl font-black">MP</span>
        </div>
        <h1 id="text-thank" class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2 tracking-tight transition-colors">Payment Support</h1>
        <p id="text-desc" class="text-slate-500 dark:text-slate-400 text-sm font-medium transition-colors">Thank you for your generosity and trust.</p>
    </header>

    <div class="flex justify-center mb-8 relative z-10">
      <div id="btn-aba" class="bank-card active w-full max-w-[200px] p-4 rounded-[2rem] border-2 flex flex-col items-center shadow-sm">
        <div class="bg-white p-1 rounded-lg mb-2"><img src="aba-logo.png" class="h-6 object-contain" alt="ABA Logo"></div>
        <span class="text-[10px] font-black text-slate-500 dark:text-slate-300 uppercase tracking-widest">ABA Bank</span>
      </div>
    </div>

    <a id="pay-link-btn" href="https://pay.ababank.com/oRF8/yne8y5ps" target="_blank" class="relative z-10 w-full flex items-center justify-center gap-2 bg-[#005c8a] text-white py-4 rounded-[1.5rem] font-extrabold shadow-[0_10px_20px_-10px_rgba(0,92,138,0.5)] hover:bg-[#004263] hover:-translate-y-1 transition-all mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
      <span id="text-btn-pay">Tap here to Pay via App</span>
    </a>

    <div class="bg-slate-900 p-6 rounded-[2rem] mb-8 shadow-2xl group overflow-hidden relative text-left">
      <div class="relative z-10 mb-4 border-b border-white/10 pb-4">
        <p id="text-acc-name-label" class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-black mb-1">Account Name</p>
        <p id="acc-name" class="text-lg font-bold text-white tracking-widest font-mono">MOUNG PHEAROM</p>
      </div>
      <div class="relative z-10 flex items-center justify-between">
        <div>
          <p id="text-acc-label" class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-black mb-1">Account Number</p>
          <p id="acc-number" class="text-xl font-bold text-white tracking-widest font-mono">004 622 379</p>
        </div>
        <button onclick="copyAccount()" class="bg-white/10 hover:bg-white/20 text-white p-3 rounded-2xl transition-all active:scale-90">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
        </button>
      </div>
      <div class="absolute top-0 right-0 w-40 h-40 bg-sky-500 blur-[60px] opacity-30 -mr-10 -mt-10 pointer-events-none"></div>
    </div>

    <div class="mb-10 relative inline-block z-10 w-full">
        <div class="p-4 bg-white rounded-[2.5rem] shadow-xl border border-slate-50 dark:border-slate-600 mx-auto inline-block transition-colors">
            <img id="qr-image" src="aba-usd.png" alt="ABA QR Code" class="w-full max-w-[200px] mx-auto rounded-2xl" />
        </div>
        <div class="mt-6 bg-amber-50 dark:bg-amber-900/30 px-4 py-3 rounded-2xl border border-amber-100 dark:border-amber-700/50 transition-colors">
            <p id="text-note-desc" class="text-[11px] text-amber-700 dark:text-amber-400 font-semibold italic uppercase tracking-tight">Please send screenshot via Telegram after payment.</p>
        </div>
    </div>

    <div class="relative z-10">
        <div class="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-[1rem] mb-4 w-fit mx-auto transition-colors">
          <button id="curr-usd" onclick="setCurrency('usd')" class="px-5 py-2 rounded-[0.8rem] bg-white dark:bg-slate-800 shadow-sm font-bold text-slate-800 dark:text-white transition-all text-sm">USD ($)</button>
          <button id="curr-khr" onclick="setCurrency('khr')" class="px-5 py-2 rounded-[0.8rem] text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 font-bold transition-all text-sm">KHR (៛)</button>
        </div>
        
        <div class="relative">
          <span id="currency-symbol" class="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400 dark:text-slate-500 transition-colors">$</span>
          <input type="number" id="pay-amount" placeholder="0.00" class="w-full pl-12 pr-6 py-5 rounded-[1.5rem] border-2 border-slate-100 dark:border-slate-700 focus:border-[#003865] dark:focus:border-[#0ea5e9] focus:outline-none text-right font-bold text-2xl text-slate-800 dark:text-white transition-all bg-slate-50/50 dark:bg-slate-900/50">
        </div>
    </div>

    <footer class="mt-12 relative z-10">
        <p class="text-[9px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-[0.3em] transition-colors">Secure Transaction • 2026</p>
    </footer>
  </div>

  <script>
    let currentLang = 'en';

    // Dark Mode Toggle
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
    }

    // Currency Toggle Logic
    function setCurrency(curr) {
      const btnUsd = document.getElementById('curr-usd');
      const btnKhr = document.getElementById('curr-khr');
      const sym = document.getElementById('currency-symbol');
      const input = document.getElementById('pay-amount');

      if (curr === 'usd') {
        // Active USD
        btnUsd.className = "px-5 py-2 rounded-[0.8rem] bg-white dark:bg-slate-800 shadow-sm font-bold text-slate-800 dark:text-white transition-all text-sm";
        btnKhr.className = "px-5 py-2 rounded-[0.8rem] text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 font-bold transition-all text-sm";
        sym.innerText = "$";
        input.placeholder = "0.00";
      } else {
        // Active KHR
        btnKhr.className = "px-5 py-2 rounded-[0.8rem] bg-white dark:bg-slate-800 shadow-sm font-bold text-slate-800 dark:text-white transition-all text-sm";
        btnUsd.className = "px-5 py-2 rounded-[0.8rem] text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 font-bold transition-all text-sm";
        sym.innerText = "៛";
        input.placeholder = "0";
      }
    }

    const translations = {
      kh: {
        thank: "ការបង់ប្រាក់គាំទ្រ", desc: "សូមអរគុណសម្រាប់ការជឿទុកចិត្ត និងការគាំទ្ររបស់អ្នក។",
        accNameLabel: "ឈ្មោះគណនី", accLabel: "លេខគណនី", btnPay: "ចុចទីនេះដើម្បីបង់ប្រាក់តាម App",
        noteDesc: "សូមផ្ញើរូបភាព Screenshot មកកាន់ Telegram បន្ទាប់ពីបង់រួច។",
        copyMsg: "ចម្លងលេខគណនីរួចរាល់៖ "
      },
      en: {
        thank: "Payment Support", desc: "Thank you for your generosity and trust.",
        accNameLabel: "Account Name", accLabel: "Account Number", btnPay: "Tap here to Pay via App",
        noteDesc: "Please send screenshot via Telegram after payment.",
        copyMsg: "Account Copied: "
      },
      cn: {
        thank: "支持支付", desc: "感谢您的慷慨和信任。",
        accNameLabel: "账户名称", accLabel: "账号", btnPay: "点击此处通过 App 支付",
        noteDesc: "付款后请通过 Telegram 发送截图。",
        copyMsg: "账号已复制： "
      }
    };

    function changeLang(lang) {
      currentLang = lang;
      const t = translations[lang];
      document.getElementById('text-thank').innerText = t.thank;
      document.getElementById('text-desc').innerText = t.desc;
      document.getElementById('text-acc-name-label').innerText = t.accNameLabel;
      document.getElementById('text-acc-label').innerText = t.accLabel;
      document.getElementById('text-btn-pay').innerText = t.btnPay;
      document.getElementById('text-note-desc').innerText = t.noteDesc;
    }

    function copyAccount() {
      const acc = document.getElementById('acc-number').innerText;
      navigator.clipboard.writeText(acc);
      alert(translations[currentLang].copyMsg + acc);
    }
  </script>
</body>
</html>
